version: '3.8'

services:
  # PostgreSQL Database for Dynamic POS
  db-dynamic:
    image: postgres:17
    container_name: flexipos_dynamic_db
    restart: unless-stopped
    ports:
      - "54424:5432"  # Different port from main DB (54322)
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_DYNAMIC:-postgres}
    volumes:
      - db_dynamic_data:/var/lib/postgresql/data
      - ./docker-dynamic/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - supabase_dynamic_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase Studio for Dynamic POS
  studio-dynamic:
    image: supabase/studio:latest
    container_name: flexipos_dynamic_studio
    restart: unless-stopped
    ports:
      - "54425:3000"  # Different port from main Studio (54323)
    environment:
      SUPABASE_URL: http://kong-dynamic:8000
      SUPABASE_REST_URL: http://localhost:54423/rest/v1/
      SUPABASE_ANON_KEY: ${ANON_KEY_DYNAMIC}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY_DYNAMIC}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
      LOGFLARE_URL: http://analytics-dynamic:4000
      NEXT_PUBLIC_ENABLE_LOGS: true
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    networks:
      - supabase_dynamic_network
    depends_on:
      - kong-dynamic

  # Kong API Gateway for Dynamic POS
  kong-dynamic:
    image: kong:2.8.1
    container_name: flexipos_dynamic_kong
    restart: unless-stopped
    ports:
      - "54423:8000"  # Different port from main Kong (54321)
      - "54443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./docker-dynamic/kong:/var/lib/kong:ro
    networks:
      - supabase_dynamic_network
    depends_on:
      db-dynamic:
        condition: service_healthy

  # Auth for Dynamic POS
  auth-dynamic:
    image: supabase/gotrue:v2.158.1
    container_name: flexipos_dynamic_auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD_DYNAMIC:-postgres}@db-dynamic:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE}
    networks:
      - supabase_dynamic_network
    depends_on:
      db-dynamic:
        condition: service_healthy

  # REST API for Dynamic POS
  rest-dynamic:
    image: postgrest/postgrest:v12.2.0
    container_name: flexipos_dynamic_rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD_DYNAMIC:-postgres}@db-dynamic:5432/postgres
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    networks:
      - supabase_dynamic_network
    depends_on:
      db-dynamic:
        condition: service_healthy

  # Realtime for Dynamic POS
  realtime-dynamic:
    image: supabase/realtime:v2.30.23
    container_name: flexipos_dynamic_realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db-dynamic
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD_DYNAMIC:-postgres}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8en0kJ4H7qoXOXniw
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"
    networks:
      - supabase_dynamic_network
    depends_on:
      db-dynamic:
        condition: service_healthy

  # Storage for Dynamic POS
  storage-dynamic:
    image: supabase/storage-api:v1.0.6
    container_name: flexipos_dynamic_storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY_DYNAMIC}
      SERVICE_KEY: ${SERVICE_ROLE_KEY_DYNAMIC}
      POSTGREST_URL: http://rest-dynamic:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD_DYNAMIC:-postgres}@db-dynamic:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy-dynamic:5001
    volumes:
      - storage_dynamic_data:/var/lib/storage
    networks:
      - supabase_dynamic_network
    depends_on:
      db-dynamic:
        condition: service_healthy
      rest-dynamic:
        condition: service_started

  # Image proxy for Dynamic POS
  imgproxy-dynamic:
    image: darthsim/imgproxy:v3.8.0
    container_name: flexipos_dynamic_imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION}
    volumes:
      - storage_dynamic_data:/var/lib/storage:ro
    networks:
      - supabase_dynamic_network

volumes:
  db_dynamic_data:
    name: flexipos_dynamic_db_data
  storage_dynamic_data:
    name: flexipos_dynamic_storage_data

networks:
  supabase_dynamic_network:
    name: flexipos_dynamic_network
    driver: bridge
